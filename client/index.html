<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Holiday Vibes</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
      .goog-te-banner-frame { display: none !important; }
      body { top: 0 !important; }
      .goog-te-combo { opacity: 0; position: absolute; }
      
      /* Smooth animations */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-5px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fadeIn { animation: fadeIn 0.2s ease-out; }
    </style>
  </head>
  
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Google Translate -->
    <div id="google_translate_element"></div>
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          { pageLanguage: 'en', includedLanguages: 'en,fr,de' },
          'google_translate_element'
        );
      }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <!-- COMPACT HEADER LANGUAGE SWITCHER -->
    <div class="fixed top-4 right-4 z-50">
      <!-- Main Button -->
      <button 
        onclick="toggleLanguageDropdown()"
        class="flex items-center gap-2 px-3 py-2 bg-white/90 backdrop-blur-sm border border-gray-200 rounded-xl shadow-lg hover:shadow-xl hover:bg-white transition-all duration-200 group"
      >
        <div class="w-8 h-8 bg-gradient-to-br from-blue-400 to-purple-500 rounded-lg flex items-center justify-center">
          <span class="text-white text-sm">🌐</span>
        </div>
        <span class="text-sm font-medium text-gray-700">EN</span>
        <svg class="w-4 h-4 text-gray-500 group-hover:text-gray-700 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
        </svg>
      </button>
      
      <!-- Dropdown Menu -->
      <div id="languageDropdown" class="absolute top-12 right-0 w-48 bg-white rounded-xl shadow-2xl border border-gray-200 opacity-0 scale-95 pointer-events-none transition-all duration-200 origin-top-right animate-fadeIn">
        <div class="p-3 border-b border-gray-100">
          <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider">TRANSLATE</h3>
        </div>
        
        <div class="p-2 space-y-1">
          <button onclick="setLanguage('en')" class="language-option active">
            <div class="w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center">
              <span class="text-lg">🇺🇸</span>
            </div>
            <span class="font-medium text-gray-800">English</span>
            <div class="ml-auto w-2 h-2 rounded-full bg-blue-500"></div>
          </button>
          
          <button onclick="setLanguage('fr')" class="language-option">
            <div class="w-8 h-8 rounded-lg bg-red-100 flex items-center justify-center">
              <span class="text-lg">🇫🇷</span>
            </div>
            <span class="font-medium text-gray-800">Français</span>
            <div class="ml-auto text-xs text-gray-400">FR</div>
          </button>
          
          <button onclick="setLanguage('de')" class="language-option">
            <div class="w-8 h-8 rounded-lg bg-yellow-100 flex items-center justify-center">
              <span class="text-lg">🇩🇪</span>
            </div>
            <span class="font-medium text-gray-800">Deutsch</span>
            <div class="ml-auto text-xs text-gray-400">DE</div>
          </button>
        </div>
        
        <div class="p-3 border-t border-gray-100 bg-gray-50 rounded-b-xl">
          <p class="text-xs text-gray-500 text-center">Powered by Google</p>
        </div>
      </div>
    </div>

    <style>
      .language-option {
        @apply w-full flex items-center gap-3 p-3 rounded-lg hover:bg-gray-50 active:scale-95 transition-all duration-150;
      }
      .language-option.active {
        @apply bg-blue-50 border border-blue-100;
      }
      .language-option:hover:not(.active) {
        @apply bg-gray-50;
      }
    </style>

    <script>
      let dropdownVisible = false;
      
      function toggleLanguageDropdown() {
        const dropdown = document.getElementById('languageDropdown');
        if (dropdownVisible) {
          dropdown.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
          dropdown.classList.remove('opacity-100', 'scale-100', 'pointer-events-auto');
        } else {
          dropdown.classList.remove('opacity-0', 'scale-95', 'pointer-events-none');
          dropdown.classList.add('opacity-100', 'scale-100', 'pointer-events-auto');
        }
        dropdownVisible = !dropdownVisible;
      }
      
      function setLanguage(lang) {
        const select = document.querySelector('.goog-te-combo');
        if (select) {
          select.value = lang;
          select.dispatchEvent(new Event('change'));
          
          // Update button text
          const button = document.querySelector('[onclick="toggleLanguageDropdown()"] span:nth-child(2)');
          button.textContent = lang.toUpperCase();
          
          // Update active state
          document.querySelectorAll('.language-option').forEach(opt => {
            opt.classList.remove('active');
            if (opt.onclick.toString().includes(`'${lang}'`)) {
              opt.classList.add('active');
            }
          });
          
          // Close dropdown
          toggleLanguageDropdown();
          
          // Show subtle toast
          const languages = { 'en': 'English', 'fr': 'French', 'de': 'German' };
          const toast = document.createElement('div');
          toast.className = 'fixed top-16 right-4 z-50 bg-green-500 text-white text-sm px-3 py-2 rounded-lg shadow-lg animate-fadeIn';
          toast.textContent = `🌐 ${languages[lang]}`;
          document.body.appendChild(toast);
          setTimeout(() => toast.remove(), 1500);
        }
      }
      
      // Close dropdown when clicking outside
      document.addEventListener('click', function(e) {
        const dropdown = document.getElementById('languageDropdown');
        const button = document.querySelector('[onclick="toggleLanguageDropdown()"]');
        if (dropdownVisible && !dropdown.contains(e.target) && !button.contains(e.target)) {
          toggleLanguageDropdown();
        }
      });
    </script>
  </body>
</html>
