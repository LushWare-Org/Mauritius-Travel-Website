<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Holiday Vibes Tour - Mauritius</title>

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      /* 🔒 PREVENT RIGHT SIDE WHITE SPACE */
      html,
      body {
        width: 100%;
        max-width: 100%;
        overflow-x: hidden !important;
      }

      /* Hide Google Translate UI completely */
      .goog-te-banner-frame,
      .goog-te-banner,
      .goog-tooltip,
      .goog-te-balloon-frame,
      #goog-gt-tt,
      .goog-te-ftab,
      .skiptranslate {
        display: none !important;
        visibility: hidden !important;
        height: 0 !important;
      }

      body {
        top: 0 !important;
      }

      .goog-te-combo {
        opacity: 0;
        position: absolute;
        width: 1px;
        height: 1px;
        pointer-events: none;
      }

      /* Animation */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-fadeIn {
        animation: fadeIn 0.2s ease-out;
      }

      /* Draggable */
      .draggable-handle {
        cursor: grab;
        user-select: none;
      }

      .draggable-handle:active {
        cursor: grabbing;
      }

      #compactWindow {
        max-width: calc(100vw - 16px);
      }
    </style>
  </head>

  <body>
    <!-- React root -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Google Translate -->
    <div id="google_translate_element"></div>
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          { pageLanguage: 'en', includedLanguages: 'en,fr,de' },
          'google_translate_element'
        );
      }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <!-- 🌐 LANGUAGE SELECTOR -->
    <div id="languageContainer" class="fixed z-[999999] top-4 right-4">
      <!-- Toggle Button -->
      <button
        id="compactToggleBtn"
        onclick="toggleCompactWindow()"
        class="w-8 h-8 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full shadow-lg hover:scale-110 transition flex items-center justify-center"
      >
        <span class="text-white text-xl">🌐</span>
      </button>

      <!-- Floating Window -->
      <div
        id="compactWindow"
        class="absolute top-12 right-0 bg-white rounded-xl shadow-xl border opacity-0 scale-95 pointer-events-none transition origin-top-right hidden"
      >
        <!-- Header -->
        <div
          class="draggable-handle px-3 py-2 bg-gradient-to-r from-blue-50 to-purple-50 border-b rounded-t-xl flex justify-between items-center"
        >
          <span class="text-xs font-semibold text-gray-700">Translate</span>
          <button onclick="toggleCompactWindow()">✕</button>
        </div>

        <!-- Languages -->
        <div class="p-2 space-y-2">
          <button onclick="setCompactLanguage('en')" class="flex items-center gap-2 w-full">
            🇺🇸 <span>English</span>
          </button>
          <button onclick="setCompactLanguage('fr')" class="flex items-center gap-2 w-full">
            🇫🇷 <span>Français</span>
          </button>
          <button onclick="setCompactLanguage('de')" class="flex items-center gap-2 w-full">
            🇩🇪 <span>Deutsch</span>
          </button>
        </div>
      </div>
    </div>

    <script>
      let isOpen = false;
      let isDragging = false;
      let startX = 0;
      let startY = 0;
      let offsetX = 0;
      let offsetY = 0;

      const toggleBtn = document.getElementById('compactToggleBtn');
      const windowEl = document.getElementById('compactWindow');
      const header = windowEl.querySelector('.draggable-handle');

      function toggleCompactWindow() {
        isOpen = !isOpen;
        if (isOpen) {
          windowEl.classList.remove('hidden');
          setTimeout(() => {
            windowEl.classList.remove('opacity-0', 'scale-95', 'pointer-events-none');
          }, 10);
        } else {
          windowEl.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
          setTimeout(() => windowEl.classList.add('hidden'), 200);
        }
      }

      function setCompactLanguage(lang) {
        const select = document.querySelector('.goog-te-combo');
        if (select) {
          select.value = lang;
          select.dispatchEvent(new Event('change'));
        }
        toggleCompactWindow();
      }

      header.addEventListener('mousedown', (e) => {
        isDragging = true;
        startX = e.clientX - offsetX;
        startY = e.clientY - offsetY;
        windowEl.style.transition = 'none';
      });

      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;

        let x = e.clientX - startX;
        let y = e.clientY - startY;

        const rect = windowEl.getBoundingClientRect();
        x = Math.max(Math.min(x, window.innerWidth - rect.width - 8), -rect.left);
        y = Math.max(Math.min(y, window.innerHeight - rect.height - 8), -rect.top);

        offsetX = x;
        offsetY = y;

        windowEl.style.transform = `translate3d(${x}px, ${y}px, 0)`;
      });

      document.addEventListener('mouseup', () => {
        isDragging = false;
        windowEl.style.transition = 'transform 0.2s ease';
      });

      document.addEventListener('click', (e) => {
        if (isOpen && !windowEl.contains(e.target) && !toggleBtn.contains(e.target)) {
          toggleCompactWindow();
        }
      });
    </script>
  </body>
</html>
